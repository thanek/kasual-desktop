apps:
  - name: Steam
    command: steam
    args:
      - "steam://open/bigpicture"
    icon: fa5b.steam
    color: "#1b2838"
    recall_menu_trigger: BTN_MODE_HOLD_1S
    # Steam maps a bootstrap window before Big Picture finishes its first
    # frame; wait this long after detecting the window before hiding KD so we
    # don't briefly uncover the half-drawn frame. Other apps default to 0.
    launch_hide_grace_ms: 500

  - name: Heroic
    command: heroic
    args:
      - "--fullscreen"
    icon: fa5s.gamepad
    color: "#c0392b"
    recall_menu_trigger: BTN_MODE_CLICK

  - name: YouTube
    command: apps/yt/yt.sh
    args: []
    icon: fa5b.youtube
    color: "#c0392b"
    recall_menu_trigger: BTN_MODE_CLICK

  - name: Pliki
    command: apps/file_browser/file_browser.sh
    args: []
    icon: fa5s.folder-open
    color: "#5e81ac"
    recall_menu_trigger: BTN_MODE_CLICK

  - name: Firefox
    command: firefox
    args:
      - "--kiosk"
    icon: fa5b.firefox-browser
    color: "#e67e22"
    recall_menu_trigger: BTN_MODE_CLICK
