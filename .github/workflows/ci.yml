name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgl1 \
            libegl1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libpulse0 \
            python3-pyqt6 \
            python3-pyqt6.sip \
            python3-pyqt6.qtmultimedia \
            python3-pyqt6.qtwebengine \
            python3-qtawesome \
            python3-evdev \
            python3-xlib \
            python3-pytest \
            python3-pytestqt \
            python3-pytest-subtests \
            layer-shell-qt \
            qt6-wayland

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: ./test.sh --tb=short -q
